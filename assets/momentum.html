<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUGMENTED INTELLIGENCE // SAI BERA</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg: #0a0e14; --surface: #131820; --border: #1e2a3a; --text: #b3c7d6;
    --text-dim: #556678; --accent: #39bae6; --accent-glow: rgba(57,186,230,0.15);
    --green: #c2d94c; --red: #ff8f40; --yellow: #ffb454;
    --font-mono: 'Space Mono', 'SF Mono', Consolas, monospace;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--bg); color: var(--text);
    font-family: var(--font-sans); -webkit-font-smoothing: antialiased;
    padding: 40px 20px; max-width: 1200px; margin: 0 auto;
  }
  .header {
    display: flex; justify-content: space-between; align-items: flex-end;
    border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px;
  }
  .header-left h1 { font-family: var(--font-mono); font-size: 20px; font-weight: bold; color: var(--accent); letter-spacing: 2px; }
  .header-left .subtitle { color: var(--text-dim); font-size: 13px; margin-top: 4px; }
  .header-right { text-align: right; }
  .btn-back { color: var(--text-dim); text-decoration: none; font-size: 13px; border: 1px solid var(--border); padding: 6px 12px; border-radius: 4px; transition: all 0.2s; }
  .btn-back:hover { color: var(--accent); border-color: var(--accent); }

  /* GRAPH CONTAINER */
  #graph-container {
    width: 100%; height: 500px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px; margin-bottom: 40px;
    overflow: hidden; position: relative;
  }

  /* SYNTHESES CARDS */
  .section-title {
    font-family: var(--font-mono); font-size: 15px; color: var(--accent);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px;
  }
  .syntheses-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(500px, 1fr)); gap: 24px;
  }
  .synthesis-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 24px; display: flex; flex-direction: column; gap: 16px;
  }
  .synth-header { border-bottom: 1px dashed var(--border); padding-bottom: 12px; }
  .synth-title { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .synth-model { font-family: var(--font-mono); font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
  .synth-section { display: flex; flex-direction: column; gap: 6px; }
  .synth-label { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); text-transform: uppercase; }
  .synth-text { font-size: 14px; line-height: 1.6; color: var(--text); }
  .synth-solution { color: var(--green); }

  /* D3 TOOLTIP */
  .tooltip {
    position: absolute; text-align: center; padding: 6px 10px; font-size: 12px;
    background: #000; color: #fff; border: 1px solid var(--border); border-radius: 4px;
    pointer-events: none; opacity: 0; transition: opacity 0.2s; font-family: var(--font-mono);
  }

  @media (max-width: 768px) {
    .syntheses-grid { grid-template-columns: 1fr; }
  }

  /* === HOUSING INSIGHTS === */
  .housing-section { margin-top: 60px; border-top: 1px solid var(--border); padding-top: 40px; }
  .housing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
  .housing-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 20px 24px; border-left: 4px solid var(--accent);
  }
  .housing-card.model-probabilistic-thinking { border-left-color: var(--green); }
  .housing-card.model-thinking-in-bets { border-left-color: var(--yellow); }
  .housing-card.model-euclidean-thinking { border-left-color: var(--accent); }
  .housing-card .hc-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .housing-card .hc-stem-tag {
    font-family: var(--font-mono); font-size: 9px; text-transform: uppercase;
    letter-spacing: 1.5px; padding: 3px 8px; border-radius: 3px;
    background: rgba(57,186,230,0.1); color: var(--accent);
  }
  .housing-card .hc-title { font-size: 17px; font-weight: 600; color: #fff; flex: 1; }
  .housing-card .hc-label {
    font-family: var(--font-mono); font-size: 10px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
  }
  .housing-card .hc-text { font-size: 13px; line-height: 1.6; color: var(--text); margin-bottom: 12px; }
  .housing-card .hc-solution { color: var(--green); }
  @media (max-width: 768px) { .housing-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>◆ AUGMENTED INTELLIGENCE</h1>
    <div class="subtitle" id="data-status">Live Graph Sync & Synthesis Engine</div>
  </div>
  <div class="header-right">
    <a href="/" class="btn-back">Return to Dashboard</a>
  </div>
</div>

<div id="graph-container"></div>
<div class="tooltip" id="tooltip"></div>

<div class="section-title">Novel Syntheses & Emergent Solutions</div>
<div class="syntheses-grid" id="syntheses-container">
  <!-- Filled by JS -->
</div>

<div class="housing-section">
  <div class="section-title">🏠 Housing Insights · STEM-Synthesized</div>
  <div class="housing-grid" id="housing-container">
    <!-- Filled by JS -->
    <div style="padding:20px;color:var(--text-dim);">Loading housing insights...</div>
  </div>
</div>

<script>
  function renderSyntheses(syntheses) {
    const container = document.getElementById('syntheses-container');
    container.innerHTML = '';
    
    syntheses.forEach(s => {
      const card = document.createElement('div');
      card.className = 'synthesis-card';
      
      let html = `<div class="synth-header">
        <div class="synth-title">${s.title}</div>
        <div class="synth-model">STEM Model: ${s.model}</div>
      </div>`;
      
      if (s.problem) {
        html += `<div class="synth-section">
          <div class="synth-label">The Axiom / Bottleneck</div>
          <div class="synth-text">${s.problem.replace(/\n/g, '<br>')}</div>
        </div>`;
      }
      
      if (s.solution) {
        html += `<div class="synth-section">
          <div class="synth-label">Novel Solution / Strategy</div>
          <div class="synth-text synth-solution">${s.solution.replace(/\n/g, '<br>')}</div>
        </div>`;
      }
      
      card.innerHTML = html;
      container.appendChild(card);
    });
  }

  function renderHousingInsights(syntheses) {
    const container = document.getElementById('housing-container');
    container.innerHTML = '';

    if (!syntheses || syntheses.length === 0) {
      container.innerHTML = '<div style="padding:20px;color:var(--text-dim);">No housing insights available.</div>';
      return;
    }

    syntheses.forEach(s => {
      const card = document.createElement('div');
      // kebab-case the model for CSS class matching
      const modelClass = s.model.toLowerCase().replace(/\s+/g, '-');
      card.className = 'housing-card model-' + modelClass;

      let html = '<div class="hc-header">';
      html += '<span class="hc-stem-tag">' + s.model + '</span>';
      html += '<span class="hc-title">' + s.title + '</span>';
      html += '</div>';

      if (s.problem) {
        html += '<div class="hc-label">Problem / Axiom</div>';
        html += '<div class="hc-text">' + s.problem.replace(/\n/g, '<br>') + '</div>';
      }

      if (s.solution) {
        html += '<div class="hc-label">Solution / Strategy</div>';
        html += '<div class="hc-text hc-solution">' + s.solution.replace(/\n/g, '<br>') + '</div>';
      }

      card.innerHTML = html;
      container.appendChild(card);
    });
  }

  async function loadHousingInsights() {
    const container = document.getElementById('housing-container');
    try {
      const res = await fetch('/api/housing-graph');
      if (!res.ok) throw new Error('API Error');
      const data = await res.json();
      renderHousingInsights(data.syntheses || []);
    } catch(e) {
      container.innerHTML = '<div style="padding:20px;color:var(--red);">Housing insights unavailable. Run generate-housing-graph.py to refresh.</div>';
    }
  }

  function renderGraph(data) {
    const container = document.getElementById('graph-container');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const svg = d3.select("#graph-container")
      .append("svg")
      .attr("width", "100%")
      .attr("height", "100%")
      .call(d3.zoom().on("zoom", function (event) {
         g.attr("transform", event.transform);
      }));

    const g = svg.append("g");
    const tooltip = d3.select("#tooltip");

    const simulation = d3.forceSimulation(data.nodes)
      .force("link", d3.forceLink(data.links).id(d => d.id).distance(150))
      .force("charge", d3.forceManyBody().strength(-400))
      .force("center", d3.forceCenter(width / 2, height / 2))
      .force("collide", d3.forceCollide().radius(50));

    // Lines
    const link = g.append("g")
      .attr("stroke", "var(--border)")
      .attr("stroke-opacity", 0.6)
      .attr("stroke-width", 2)
      .selectAll("line")
      .data(data.links)
      .join("line");

    // Nodes
    const node = g.append("g")
      .attr("stroke", "#fff")
      .attr("stroke-width", 1.5)
      .selectAll("circle")
      .data(data.nodes)
      .join("circle")
      .attr("r", d => d.group === "concept" ? 12 : 8)
      .attr("fill", d => d.group === "concept" ? "var(--accent)" : "var(--green)")
      .call(drag(simulation));

    // Labels
    const label = g.append("g")
      .selectAll("text")
      .data(data.nodes)
      .join("text")
      .text(d => d.id)
      .attr("font-size", "12px")
      .attr("fill", "var(--text)")
      .attr("dx", 15)
      .attr("dy", 4)
      .style("pointer-events", "none");

    // Hover Tooltips
    node.on("mouseover", (event, d) => {
      tooltip.style("opacity", 1)
             .html(`<b>${d.id}</b><br>Type: ${d.group}`)
             .style("left", (event.pageX + 10) + "px")
             .style("top", (event.pageY - 28) + "px");
      d3.select(event.currentTarget).attr("stroke", "var(--yellow)").attr("stroke-width", 3);
    })
    .on("mouseout", (event, d) => {
      tooltip.style("opacity", 0);
      d3.select(event.currentTarget).attr("stroke", "#fff").attr("stroke-width", 1.5);
    });

    simulation.on("tick", () => {
      link
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);
      node
        .attr("cx", d => d.x)
        .attr("cy", d => d.y);
      label
        .attr("x", d => d.x)
        .attr("y", d => d.y);
    });

    function drag(simulation) {
      function dragstarted(event) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        event.subject.fx = event.subject.x;
        event.subject.fy = event.subject.y;
      }
      function dragged(event) {
        event.subject.fx = event.x;
        event.subject.fy = event.y;
      }
      function dragended(event) {
        if (!event.active) simulation.alphaTarget(0);
        event.subject.fx = null;
        event.subject.fy = null;
      }
      return d3.drag()
        .on("start", dragstarted)
        .on("drag", dragged)
        .on("end", dragended);
    }
  }

  async function init() {
    try {
      const res = await fetch('/api/augmented-graph');
      if (!res.ok) throw new Error('API Error');
      const data = await res.json();
      renderGraph(data);
      renderSyntheses(data.syntheses || []);
      loadHousingInsights();
      document.getElementById('data-status').innerText = `Graph loaded: ${data.nodes.length} nodes, ${data.links.length} connections`;
    } catch(e) {
      document.getElementById('graph-container').innerHTML = `<div style="padding:40px;text-align:center;color:var(--red);">Error loading graph data.</div>`;
      document.getElementById('data-status').innerText = 'Offline';
    }
  }

  init();
</script>
</body>
</html>
